<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007acc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VS Code">
    
    
    <title>VS Code Server</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 32px;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            background: #007acc;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(0, 122, 204, 0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #888888;
            margin-bottom: 32px;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            background: #2d2d2d;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .status.connected {
            background: #1a3a1a;
            border: 1px solid #4caf50;
        }
        .status.disconnected {
            background: #3a1a1a;
            border: 1px solid #f44336;
        }
        .status.checking {
            background: #2d2a1a;
            border: 1px solid #ff9800;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot.green { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .dot.red { background: #f44336; box-shadow: 0 0 8px #f44336; }
        .dot.yellow { background: #ff9800; box-shadow: 0 0 8px #ff9800; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            text-decoration: none;
        }
        .btn-primary {
            background: #007acc;
            color: white;
        }
        .btn-primary:hover { background: #005a9e; }
        .btn-primary:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #333;
            color: #ccc;
            border: 1px solid #444;
        }
        .btn-secondary:hover { background: #444; }
        
        .help {
            margin-top: 32px;
            font-size: 12px;
            color: #666;
            line-height: 1.8;
        }
        .help code {
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            color: #4ec9b0;
            font-size: 12px;
        }
        
        .install-banner {
            background: #2d2d1a;
            border: 1px solid #ff9800;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            font-size: 13px;
            color: #ffcc80;
            text-align: left;
            display: none;
        }
        .install-banner.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">>_</div>
        <h1>VS Code Server</h1>
        <p class="subtitle">Full VS Code in your browser</p>
        
        <div class="status checking" id="status">
            <div class="dot yellow"></div>
            <span id="statusText">Checking code-server...</span>
        </div>
        
        <a class="btn btn-primary" id="openBtn" href="http://localhost:8080" target="_blank" disabled>
            Open VS Code
        </a>
        
        <button class="btn btn-secondary" id="retryBtn" onclick="checkServer()">
            🔄 Check Again
        </button>
        
        <button class="btn btn-secondary" id="installBtn" onclick="installPWA()" style="display:none;">
            📲 Install as App
        </button>
        
        <div class="install-banner" id="installBanner">
            <strong>⚡ Quick Setup (Termux):</strong><br>
            <code>bash setup-termux.sh</code><br>
            then <code>cs start</code>
        </div>
        
        <div class="help">
            <strong>📱 How to use:</strong><br>
            1. Open <strong>Termux</strong><br>
            2. Run: <code>cs start</code><br>
            3. Come back here & tap <strong>Open VS Code</strong><br>
            4. Tap <strong>⋮ → Add to Home Screen</strong> for app-like experience
        </div>
    </div>

    <script>
        const CODE_SERVER_URL = 'http://localhost:8080';
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const openBtn = document.getElementById('openBtn');
        const installBtn = document.getElementById('installBtn');
        const installBanner = document.getElementById('installBanner');
        
        let deferredPrompt;
        
        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });
        
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((result) => {
                    if (result.outcome === 'accepted') {
                        installBtn.style.display = 'none';
                    }
                });
            }
        }
        
        async function checkServer() {
            statusDiv.className = 'status checking';
            statusDiv.querySelector('.dot').className = 'dot yellow';
            statusText.textContent = 'Checking code-server...';
            openBtn.disabled = true;
            
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 4000);
                
                const response = await fetch(CODE_SERVER_URL + '/healthz', {
                    signal: controller.signal,
                    cache: 'no-cache'
                });
                clearTimeout(timeout);
                
                if (response.ok) {
                    statusDiv.className = 'status connected';
                    statusDiv.querySelector('.dot').className = 'dot green';
                    statusText.textContent = '✅ code-server is running';
                    openBtn.disabled = false;
                    installBanner.classList.remove('show');
                } else {
                    throw new Error('Not healthy');
                }
            } catch (err) {
                // Try the main URL as fallback
                try {
                    const controller2 = new AbortController();
                    const timeout2 = setTimeout(() => controller2.abort(), 4000);
                    const r = await fetch(CODE_SERVER_URL, { 
                        signal: controller2.signal,
                        cache: 'no-cache',
                        redirect: 'follow'
                    });
                    clearTimeout(timeout2);
                    
                    statusDiv.className = 'status connected';
                    statusDiv.querySelector('.dot').className = 'dot green';
                    statusText.textContent = '✅ code-server is running';
                    openBtn.disabled = false;
                    installBanner.classList.remove('show');
                } catch (err2) {
                    statusDiv.className = 'status disconnected';
                    statusDiv.querySelector('.dot').className = 'dot red';
                    statusText.textContent = '❌ code-server not running';
                    openBtn.disabled = true;
                    installBanner.classList.add('show');
                }
            }
        }
        
        // Check on load
        checkServer();
        
        // Auto-retry every 5 seconds if not connected
        let retryInterval;
        function startRetry() {
            retryInterval = setInterval(() => {
                if (openBtn.disabled) checkServer();
                else clearInterval(retryInterval);
            }, 5000);
        }
        startRetry();
        
    </script>
</body>
</html>
